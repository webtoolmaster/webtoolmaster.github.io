<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebToolMaster | Ücretsiz Online Araçlar</title>
    <meta name="description" content="WebToolMaster ile kredi hesaplama, kripto çevirici, şifre oluşturucu ve 10'dan fazla ücretsiz araca anında ulaşın.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind'e karanlık modun 'class' ile kontrol edileceğini bildiriyoruz
        tailwind.config = {
            darkMode: 'class',
        }

        // Sayfa yüklenirken localStorage kontrolü
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        .tool-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tool-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 dark:text-blue-400 tracking-tight">
                WebTool<span class="text-gray-900 dark:text-white">Master</span>
            </h1>
            
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">
                    <span id="theme-toggle-dark-icon" class="hidden text-xl">🌙</span>
                    <span id="theme-toggle-light-icon" class="hidden text-xl">☀️</span>
                </button>
                <nav class="hidden md:flex space-x-6 font-medium">
                    <a href="#" class="hover:text-blue-600 dark:hover:text-blue-400 transition">Ana Sayfa</a>
                    <a href="#tools" class="hover:text-blue-600 dark:hover:text-blue-400 transition">Araçlar</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="bg-blue-600 dark:bg-blue-800 py-16 text-white text-center transition-colors">
        <div class="container mx-auto px-4">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4">WebToolMaster</h2>
            <p class="text-blue-100 text-lg mb-8 max-w-2xl mx-auto">Günlük dijital ihtiyaçlarınız için profesyonel, hızlı ve tamamen ücretsiz araçlar koleksiyonu.</p>
            <div class="max-w-2xl mx-auto relative">
                <input type="text" id="toolSearch" placeholder="Aradığınız aracı yazın (Örn: Şifre, Kredi, JSON...)" 
                       class="w-full px-6 py-4 rounded-2xl text-gray-900 focus:outline-none focus:ring-4 focus:ring-blue-300 shadow-xl dark:bg-gray-700 dark:text-white dark:focus:ring-blue-900 border-none">
            </div>
        </div>
    </section>

    <!-- Reklam Alanı -->
    <div class="container mx-auto px-4 py-8 text-center">
        <div class="bg-white dark:bg-gray-800 h-28 flex items-center justify-center border-dashed border-2 border-gray-300 dark:border-gray-700 rounded-2xl shadow-sm">
            <span class="text-gray-400 dark:text-gray-500 font-medium italic">Reklam Alanı (Google AdSense için hazır)</span>
        </div>
    </div>

    <!-- Araç Kartları -->
    <main class="container mx-auto px-4 py-12 flex-grow" id="tools">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="toolGrid">
            <!-- JavaScript burayı dolduracak -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-800 py-10 transition-colors">
        <div class="container mx-auto px-4 text-center">
            <div class="mb-6">
                <span class="text-xl font-bold text-blue-600 dark:text-blue-400">WebToolMaster</span>
            </div>
            <p class="text-gray-500 dark:text-gray-400 text-sm">&copy; 2026 Tüm Hakları Saklıdır. Hız, Gizlilik ve Basitlik.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
